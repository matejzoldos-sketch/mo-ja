name: Shopify → Supabase sync

on:
  schedule:
    # UTC (GitHub Actions ignores job TZ). 00:00 UTC ≈ 02:00 Bratislava (CEST) / 01:00 (CET).
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode (ignored if created_from is set). ytd = orders created this calendar year; daily = last 14d updated_at"
        required: true
        default: "ytd"
        type: choice
        options:
          - ytd
          - daily
      created_from:
        description: "Optional YYYY-MM-DD. If set, one full sync: orders with created_at ≥ date + locations + inventory (e-shop launch backfill). Example: 2025-11-20"
        required: false
        default: ""
        type: string

env:
  SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
  SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
  SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
  SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
  SHOPIFY_API_VERSION: ${{ secrets.SHOPIFY_API_VERSION }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TZ: Europe/Bratislava

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=ytd" >> "$GITHUB_OUTPUT"
          fi

      # Avoid `inputs.*` in step `if` for schedule (inputs context is dispatch-only).
      - name: Backfill vs regular sync
        id: kind
        shell: bash
        run: |
          CF="$(echo '${{ inputs.created_from }}' | xargs)"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$CF" ]; then
            echo "backfill=1" >> "$GITHUB_OUTPUT"
            echo "created_from=$CF" >> "$GITHUB_OUTPUT"
          else
            echo "backfill=0" >> "$GITHUB_OUTPUT"
            echo "created_from=" >> "$GITHUB_OUTPUT"
          fi

      - name: Backfill orders by created_at + inventory
        if: steps.kind.outputs.backfill == '1'
        run: python sync_shopify.py --created-from "${{ steps.kind.outputs.created_from }}"

      - name: Quick sync (updated last 14 days + inventory)
        if: steps.kind.outputs.backfill != '1' && steps.mode.outputs.mode == 'daily'
        run: python sync_shopify.py --days 14

      - name: YTD orders + inventory (matches dashboard / sklad YTD)
        if: steps.kind.outputs.backfill != '1' && steps.mode.outputs.mode == 'ytd'
        run: python sync_shopify.py --ytd
