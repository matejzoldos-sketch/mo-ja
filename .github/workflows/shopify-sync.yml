name: Shopify → Supabase sync

on:
  schedule:
    # UTC (GitHub Actions ignores job TZ). 00:00 UTC ≈ 02:00 Bratislava (CEST) / 01:00 (CET).
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode (ytd = full year orders for dashboards; daily = last 14d updated_at only)"
        required: true
        default: "ytd"
        type: choice
        options:
          - ytd
          - daily

env:
  SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
  SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
  SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
  SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
  SHOPIFY_API_VERSION: ${{ secrets.SHOPIFY_API_VERSION }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TZ: Europe/Bratislava

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=ytd" >> "$GITHUB_OUTPUT"
          fi

      - name: Quick sync (updated last 14 days + inventory)
        if: steps.mode.outputs.mode == 'daily'
        run: python sync_shopify.py --days 14

      - name: YTD orders + inventory (matches dashboard / sklad YTD)
        if: steps.mode.outputs.mode == 'ytd'
        run: python sync_shopify.py --ytd
