name: Shopify → Supabase sync

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - ytd

env:
  SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
  SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
  SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
  SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
  SHOPIFY_API_VERSION: ${{ secrets.SHOPIFY_API_VERSION }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TZ: Europe/Bratislava

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "$(TZ=Europe/Bratislava date +%u)" = "1" ]; then
            echo "mode=ytd" >> "$GITHUB_OUTPUT"
          else
            echo "mode=daily" >> "$GITHUB_OUTPUT"
          fi

      - name: Daily sync (14 days + inventory)
        if: steps.mode.outputs.mode == 'daily'
        run: python sync_shopify.py --days 14

      - name: YTD orders + inventory
        if: steps.mode.outputs.mode == 'ytd'
        run: python sync_shopify.py --ytd
