# Tatra banka AIS → Supabase. Vyžaduje TATRA_REFRESH_TOKEN (OAuth súhlas AIS).
# Secrets: SUPABASE_*, TATRA_CLIENT_ID, TATRA_CLIENT_SECRET, TATRA_REFRESH_TOKEN.

name: Tatra banka sync

on:
  schedule:
    # 00:30 UTC — pol hodiny po Shopify sync (00:00 UTC).
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Počet dní spätne (booking)"
        required: true
        default: "400"
      tatra_env:
        description: "Tatra API (OAuth + Premium API koreň)"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - sandbox

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  TATRA_CLIENT_ID: ${{ secrets.TATRA_CLIENT_ID }}
  TATRA_CLIENT_SECRET: ${{ secrets.TATRA_CLIENT_SECRET }}
  TATRA_REFRESH_TOKEN: ${{ secrets.TATRA_REFRESH_TOKEN }}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TATRA_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.tatra_env || 'production' }}
      TATRA_TX_DATE_FROM_MIN: "2026-01-01"
      # Bez refresh tokenu AIS vracia NO_AUTHORIZATION (token cez client_credentials nestačí).
      TATRA_REQUIRE_REFRESH_TOKEN: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Run sync_tatra
        run: python etl/sync_tatra.py --days "${{ github.event_name == 'workflow_dispatch' && inputs.days || '400' }}"
